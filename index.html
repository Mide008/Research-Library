<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Bank - Your Research Library</title>
    <meta name="description" content="Organize, manage, and share your research resources beautifully">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- SortableJS for drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- GSAP for animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Header Section -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="logo">
                    <span class="logo-icon">📚</span>
                    Resource Bank
                </h1>
                <div class="item-counter">
                    <span id="item-count">0</span>
                    <span class="counter-label">resources</span>
                </div>
            </div>
            <div class="header-right">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search resources..." class="search-input">
                    <button id="clear-search" class="clear-search" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="header-actions">
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="grid" title="Grid View">
                            <i class="fas fa-th"></i>
                        </button>
                        <button class="view-btn" data-view="list" title="List View">
                            <i class="fas fa-list"></i>
                        </button>
                        <button class="view-btn" data-view="compact" title="Compact View">
                            <i class="fas fa-th-large"></i>
                        </button>
                    </div>
                    <div class="sort-dropdown">
                        <button class="sort-btn" id="sort-btn">
                            <i class="fas fa-sort"></i>
                            <span>Sort</span>
                        </button>
                        <div class="sort-menu" id="sort-menu">
                            <button class="sort-option active" data-sort="date-desc">
                                <i class="fas fa-calendar-plus"></i> Newest First
                            </button>
                            <button class="sort-option" data-sort="date-asc">
                                <i class="fas fa-calendar-minus"></i> Oldest First
                            </button>
                            <button class="sort-option" data-sort="name-asc">
                                <i class="fas fa-sort-alpha-down"></i> A → Z
                            </button>
                            <button class="sort-option" data-sort="name-desc">
                                <i class="fas fa-sort-alpha-up"></i> Z → A
                            </button>
                            <button class="sort-option" data-sort="edited">
                                <i class="fas fa-clock"></i> Recently Edited
                            </button>
                        </div>
                    </div>
                    <button class="export-btn" id="export-btn" title="Export Data">
                        <i class="fas fa-download"></i>
                        <span>Export</span>
                    </button>
                    <button class="import-btn" id="import-btn" title="Import Data">
                        <i class="fas fa-upload"></i>
                        <span>Import</span>
                    </button>
                    <input type="file" id="import-file-input" accept=".json,.csv" style="display: none;">
                    <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button class="add-btn" id="add-item-button">
                        <i class="fas fa-plus"></i>
                        <span>Add Resource</span>
                    </button>
                </div>
            </div>
        </div>
        <div class="filter-tags" id="filter-tags">
            <button class="tag-filter active" data-tag="all">All</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="items-section" id="items-section">
            <!-- Items will be dynamically inserted here -->
        </div>
    </main>

    <!-- Right Drawer Modal -->
    <div class="drawer-overlay" id="drawer-overlay">
        <div class="drawer" id="drawer">
            <div class="drawer-header">
                <h2 id="drawer-title">Add Resource</h2>
                <button class="drawer-close" id="drawer-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="drawer-body">
                <form id="form">
                    <!-- URL Input with Auto-fill -->
                    <div class="input-group">
                        <label for="resource-link">
                            <i class="fas fa-link"></i>
                            Resource URL
                        </label>
                        <div class="input-wrapper">
                            <input type="url" name="resource-link" id="resource-link" placeholder="https://example.com" autocomplete="off">
                            <button type="button" class="auto-fill-btn" id="auto-fill-btn" title="Auto-fill from URL">
                                <i class="fas fa-magic"></i>
                            </button>
                        </div>
                        <div class="error-message" id="link-error"></div>
                        <div class="url-preview" id="url-preview"></div>
                    </div>

                    <!-- Name Input -->
                    <div class="input-group">
                        <label for="resource-name">
                            <i class="fas fa-heading"></i>
                            Resource Name
                        </label>
                        <input type="text" name="resource-name" id="resource-name" placeholder="e.g., Biology Fundamentals">
                        <div class="error-message" id="name-error"></div>
                    </div>

                    <!-- Description Input -->
                    <div class="input-group">
                        <label for="description">
                            <i class="fas fa-align-left"></i>
                            Description
                            <span class="char-counter"><span id="char-count">0</span>/500</span>
                        </label>
                        <textarea name="description-of-item" id="description" placeholder="Describe this resource..." maxlength="500"></textarea>
                        <div class="error-message" id="description-error"></div>
                    </div>

                    <!-- Tags Input -->
                    <div class="input-group">
                        <label for="tags-input">
                            <i class="fas fa-tags"></i>
                            Tags
                        </label>
                        <div class="tags-input-wrapper">
                            <div class="tags-display" id="tags-display"></div>
                            <input type="text" id="tags-input" placeholder="Add tags (press Enter)">
                        </div>
                        <div class="tag-suggestions" id="tag-suggestions">
                            <span class="suggestion-label">Suggestions:</span>
                            <button type="button" class="tag-suggestion" data-tag="Inspiration">Inspiration</button>
                            <button type="button" class="tag-suggestion" data-tag="Code">Code</button>
                            <button type="button" class="tag-suggestion" data-tag="Design">Design</button>
                            <button type="button" class="tag-suggestion" data-tag="Typography">Typography</button>
                            <button type="button" class="tag-suggestion" data-tag="Research">Research</button>
                            <button type="button" class="tag-suggestion" data-tag="Tutorial">Tutorial</button>
                        </div>
                    </div>

                    <!-- Favorite Toggle -->
                    <div class="input-group">
                        <label class="favorite-toggle">
                            <input type="checkbox" id="favorite-checkbox">
                            <span class="favorite-label">
                                <i class="far fa-star"></i>
                                <i class="fas fa-star"></i>
                                Mark as favorite
                            </span>
                        </label>
                    </div>

                    <input type="hidden" id="edit-index" value="-1">

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <button type="submit" class="submit-btn" id="submitButton">
                            <i class="fas fa-check"></i>
                            <span>Add Resource</span>
                        </button>
                        <button type="button" class="cancel-btn" id="cancel-btn">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="delete-confirmation-overlay" id="delete-confirmation-overlay">
        <div class="delete-modal">
            <div class="delete-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="delete-modal-title">
                <h3>Delete Resource</h3>
            </div>
            <div class="delete-modal-content">
                <p>Are you sure you want to delete this resource? This action cannot be undone.</p>
                <div class="delete-modal-buttons">
                    <button id="confirm-delete-btn" class="btn-delete">
                        <i class="fas fa-trash"></i>
                        Delete
                    </button>
                    <button id="cancel-delete-btn" class="btn-cancel">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bulk Actions Bar -->
    <div class="bulk-actions-bar" id="bulk-actions-bar">
        <div class="bulk-info">
            <span id="selected-count">0</span> selected
        </div>
        <div class="bulk-buttons">
            <button class="bulk-btn" id="bulk-export-btn">
                <i class="fas fa-download"></i>
                Export Selected
            </button>
            <button class="bulk-btn" id="bulk-delete-btn">
                <i class="fas fa-trash"></i>
                Delete Selected
            </button>
            <button class="bulk-btn-cancel" id="bulk-cancel-btn">
                Cancel
            </button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
