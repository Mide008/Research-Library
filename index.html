<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Bank — Your Research Intelligence Hub</title>
    <meta name="description" content="Organize, manage, and gain AI-powered insights from your research resources">
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <h1 class="logo">
                    <span class="logo-icon">📚</span>
                    Resource Bank
                </h1>
                <div class="item-counter">
                    <span id="item-count">0</span>
                    <span class="counter-label">resources</span>
                </div>
            </div>
            <div class="header-right">
                <div class="search-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search resources or ask a question…" class="search-input">
                    <button id="clear-search" class="clear-search" style="display:none;"><i class="fas fa-times"></i></button>
                </div>
                <div class="header-actions">
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="grid" title="Grid View"><i class="fas fa-th"></i></button>
                        <button class="view-btn" data-view="list" title="List View"><i class="fas fa-list"></i></button>
                        <button class="view-btn" data-view="compact" title="Compact View"><i class="fas fa-th-large"></i></button>
                    </div>
                    <div class="sort-dropdown">
                        <button class="sort-btn" id="sort-btn"><i class="fas fa-sort"></i><span>Sort</span></button>
                        <div class="sort-menu" id="sort-menu">
                            <button class="sort-option active" data-sort="date-desc"><i class="fas fa-calendar-plus"></i> Newest First</button>
                            <button class="sort-option" data-sort="date-asc"><i class="fas fa-calendar-minus"></i> Oldest First</button>
                            <button class="sort-option" data-sort="name-asc"><i class="fas fa-sort-alpha-down"></i> A → Z</button>
                            <button class="sort-option" data-sort="name-desc"><i class="fas fa-sort-alpha-up"></i> Z → A</button>
                            <button class="sort-option" data-sort="edited"><i class="fas fa-clock"></i> Recently Edited</button>
                        </div>
                    </div>
                    <button class="header-action-btn" id="export-btn" title="Export Data"><i class="fas fa-download"></i><span>Export</span></button>
                    <button class="header-action-btn" id="import-btn" title="Import Data"><i class="fas fa-upload"></i><span>Import</span></button>
                    <input type="file" id="import-file-input" accept=".json,.csv" style="display:none;">
                    <button class="header-action-btn ai-digest-btn" id="digest-btn" title="AI Research Digest"><i class="fas fa-brain"></i><span>Digest</span></button>
                    <button class="theme-toggle" id="theme-toggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
                    <button class="header-action-btn api-key-btn" id="api-key-btn" title="Configure AI API Key"><i class="fas fa-key"></i></button>
                    <button class="add-btn" id="add-item-button"><i class="fas fa-plus"></i><span>Add Resource</span></button>
                </div>
            </div>
        </div>
        <div class="filter-tags" id="filter-tags">
            <button class="tag-filter active" data-tag="all">All</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="items-section" id="items-section"></div>
    </main>

    <!-- ============================================================
         ADD / EDIT DRAWER
    ============================================================ -->
    <div class="drawer-overlay" id="drawer-overlay">
        <div class="drawer" id="drawer">
            <div class="drawer-header">
                <h2 id="drawer-title">Add Resource</h2>
                <button class="drawer-close" id="drawer-close"><i class="fas fa-times"></i></button>
            </div>
            <div class="drawer-body">
                <form id="form">
                    <!-- URL -->
                    <div class="input-group">
                        <label for="resource-link"><i class="fas fa-link"></i> Resource URL</label>
                        <div class="input-wrapper">
                            <input type="url" name="resource-link" id="resource-link" placeholder="https://example.com" autocomplete="off">
                            <button type="button" class="auto-fill-btn" id="auto-fill-btn" title="Auto-fill from URL"><i class="fas fa-magic"></i></button>
                        </div>
                        <div class="error-message" id="link-error"></div>
                        <div class="url-preview" id="url-preview"></div>
                    </div>

                    <!-- Name -->
                    <div class="input-group">
                        <label for="resource-name"><i class="fas fa-heading"></i> Resource Name</label>
                        <input type="text" name="resource-name" id="resource-name" placeholder="e.g., Biology Fundamentals">
                        <div class="error-message" id="name-error"></div>
                    </div>

                    <!-- Description -->
                    <div class="input-group">
                        <label for="description">
                            <i class="fas fa-align-left"></i> Description
                            <span class="char-counter"><span id="char-count">0</span>/500</span>
                            <button type="button" class="ai-assist-inline-btn" id="gen-description-btn" title="Generate description with AI">
                                <i class="fas fa-wand-magic-sparkles"></i> AI Generate
                            </button>
                        </label>
                        <textarea name="description-of-item" id="description" placeholder="Describe this resource…" maxlength="500"></textarea>
                        <div class="error-message" id="description-error"></div>
                    </div>

                    <!-- Key Insights (AI-extracted, editable) -->
                    <div class="input-group" id="insights-group" style="display:none;">
                        <label><i class="fas fa-lightbulb"></i> Key Insights <span class="ai-badge">AI</span></label>
                        <div id="insights-display" class="insights-display"></div>
                        <input type="hidden" id="insights-data" value="[]">
                    </div>

                    <!-- Tags -->
                    <div class="input-group">
                        <label for="tags-input">
                            <i class="fas fa-tags"></i> Tags
                            <button type="button" class="ai-assist-inline-btn" id="gen-tags-btn" title="AI-suggest tags">
                                <i class="fas fa-wand-magic-sparkles"></i> AI Suggest
                            </button>
                        </label>
                        <div class="tags-input-wrapper">
                            <div class="tags-display" id="tags-display"></div>
                            <input type="text" id="tags-input" placeholder="Add tags (press Enter)">
                        </div>
                        <div class="tag-suggestions" id="tag-suggestions">
                            <span class="suggestion-label">Quick:</span>
                            <button type="button" class="tag-suggestion" data-tag="Inspiration">Inspiration</button>
                            <button type="button" class="tag-suggestion" data-tag="Code">Code</button>
                            <button type="button" class="tag-suggestion" data-tag="Design">Design</button>
                            <button type="button" class="tag-suggestion" data-tag="Typography">Typography</button>
                            <button type="button" class="tag-suggestion" data-tag="Research">Research</button>
                            <button type="button" class="tag-suggestion" data-tag="Tutorial">Tutorial</button>
                        </div>
                    </div>

                    <!-- Duplicate Warning -->
                    <div class="duplicate-warning" id="duplicate-warning" style="display:none;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <div>
                            <strong>Possible duplicate detected</strong>
                            <p id="duplicate-detail"></p>
                        </div>
                        <button type="button" id="dismiss-duplicate"><i class="fas fa-times"></i></button>
                    </div>

                    <!-- Favorite -->
                    <div class="input-group">
                        <label class="favorite-toggle">
                            <input type="checkbox" id="favorite-checkbox">
                            <span class="favorite-label">
                                <i class="far fa-star"></i>
                                <i class="fas fa-star"></i>
                                Mark as favorite
                            </span>
                        </label>
                    </div>

                    <input type="hidden" id="edit-index" value="-1">

                    <!-- Citation Preview -->
                    <div class="citation-preview" id="citation-preview" style="display:none;">
                        <div class="citation-header">
                            <i class="fas fa-quote-left"></i> Citation
                            <button type="button" class="copy-citation-btn" id="copy-citation-btn" title="Copy citation"><i class="fas fa-copy"></i></button>
                        </div>
                        <p id="citation-text" class="citation-text"></p>
                    </div>

                    <!-- Form Actions -->
                    <div class="form-actions">
                        <button type="submit" class="submit-btn" id="submitButton">
                            <i class="fas fa-check"></i><span>Add Resource</span>
                        </button>
                        <button type="button" class="cancel-btn" id="cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ============================================================
         DELETE MODAL
    ============================================================ -->
    <div class="delete-confirmation-overlay" id="delete-confirmation-overlay">
        <div class="delete-modal">
            <div class="delete-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="delete-modal-title"><h3>Delete Resource</h3></div>
            <div class="delete-modal-content">
                <p>Are you sure you want to delete this resource? This action cannot be undone.</p>
                <div class="delete-modal-buttons">
                    <button id="confirm-delete-btn" class="btn-delete"><i class="fas fa-trash"></i> Delete</button>
                    <button id="cancel-delete-btn" class="btn-cancel">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
         AI DIGEST PANEL
    ============================================================ -->
    <div class="digest-overlay" id="digest-overlay">
        <div class="digest-panel" id="digest-panel">
            <div class="digest-header">
                <div class="digest-title">
                    <i class="fas fa-brain"></i>
                    <h2>Research Intelligence</h2>
                </div>
                <button class="digest-close" id="digest-close"><i class="fas fa-times"></i></button>
            </div>

            <!-- Digest Tabs -->
            <div class="digest-tabs">
                <button class="digest-tab active" data-tab="overview">Overview</button>
                <button class="digest-tab" data-tab="clusters">Clusters</button>
                <button class="digest-tab" data-tab="insights">Insights</button>
                <button class="digest-tab" data-tab="gaps">Research Gaps</button>
                <button class="digest-tab" data-tab="export-ai">AI Export</button>
            </div>

            <div class="digest-body" id="digest-body">
                <div class="digest-loading" id="digest-loading" style="display:none;">
                    <div class="digest-spinner"></div>
                    <p>Analysing your research library…</p>
                </div>
                <div id="digest-content"></div>
            </div>

            <div class="digest-footer">
                <button class="digest-run-btn" id="digest-run-btn">
                    <i class="fas fa-play"></i> Generate Analysis
                </button>
                <button class="digest-export-ai-btn" id="digest-export-notebooklm">
                    <i class="fas fa-file-arrow-down"></i> Export for NotebookLM
                </button>
            </div>
        </div>
    </div>

    <!-- Bulk Actions Bar -->
    <div class="bulk-actions-bar" id="bulk-actions-bar">
        <div class="bulk-info"><span id="selected-count">0</span> selected</div>
        <div class="bulk-buttons">
            <button class="bulk-btn" id="bulk-export-btn"><i class="fas fa-download"></i> Export Selected</button>
            <button class="bulk-btn" id="bulk-delete-btn"><i class="fas fa-trash"></i> Delete Selected</button>
            <button class="bulk-btn-cancel" id="bulk-cancel-btn">Cancel</button>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
